name: cui-reference-documentation
description: Quarkus powered Reference documentation

release:
  current-version: 1.0.0
  next-version: 1.1.0-SNAPSHOT
  create-github-release: true

maven-build:
  java-versions: '["21","25"]'
  java-version: '21'
  enable-snapshot-deploy: true
  maven-profiles-snapshot: 'release-snapshot,javadoc-mm-reporting'
  maven-profiles-release: 'release,javadoc-mm-reporting'
  npm-cache: false

sonar:
  project-key: cuioss_cui-reference-documentation
  enabled: false
  skip-on-dependabot: true

pages:
  reference: cui-reference-documentation
  deploy-at-release: true

github-automation:
  auto-merge-build-versions: true
  auto-merge-build-timeout: 300
